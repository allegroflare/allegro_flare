properties:


  - name: type
    type: std::string
    init_with: AllegroFlare::Levels::Base::TYPE
    constructor_arg: true
    getter: true

  - name: TYPE
    type: char*
    init_with: '(char*)"AllegroFlare/Levels/Base"'
    static: true
    constexpr: true


methods:


  - name: load
    virtual: true
    body: |
      AllegroFlare::Logger::throw_error(
         THIS_CLASS_AND_METHOD_NAME,
         "This method must be overridden in the derived class."
      );
      return;
    body_dependency_symbols:
      - AllegroFlare::Logger


  - name: unload
    virtual: true
    body: |
      AllegroFlare::Logger::throw_error(
         THIS_CLASS_AND_METHOD_NAME,
         "This method must be overridden in the derived class."
      );
      return;
    body_dependency_symbols:
      - AllegroFlare::Logger


  - name: is_type
    type: bool
    parameters:
      - name: possible_type
        type: std::string
        default_argument: '""'
    body: |
      return (possible_type == get_type());


dependencies:


  - symbol: AllegroFlare::Logger
    headers: [ AllegroFlare/Logger.hpp ]


